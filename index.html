<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Browser-based tool to rewrite JupyterHub links in Canvas course exports (.imscc)." />
    <title>Canvas JupyterHub Rewriter</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="/src/style.css" />
    <script>
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
    </script>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Canvas .imscc JupyterHub Link Rewriter</h1>
        <button id="themeToggle" class="theme-btn" title="Toggle Dark Mode">◑</button>
      </div>
      <p>Runs entirely in your browser. Select a Canvas <code>.imscc</code> (ZIP) and rewrite JupyterHub <code>/hub/user-redirect/</code> links.</p>

      <div class="section">
        <label>Choose .imscc / .zip file
          <input id="file" type="file" accept=".imscc,.zip" />
        </label>
      </div>

      <div class="section">
        <div class="row">
          <div class="col">
            <label>New Hub Base URL (required)
              <input id="newHub" type="text" placeholder="https://datahub.berkeley.edu/hub/" />
            </label>
          </div>
          <div class="col">
            <label>New Repo URL (required)
              <input id="newRepo" type="text" placeholder="https://github.com/<user>/<repo>" />
            </label>
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label>Old Hub Base (optional, auto-detected)
              <input id="oldHub" type="text" placeholder="(auto-detect)" />
            </label>
          </div>
          <div class="col">
            <label>Old Repo URL (optional, auto-detected)
              <input id="oldRepo" type="text" placeholder="(auto-detect)" />
            </label>
          </div>
        </div>

        <button id="scan">Scan & Preview</button>
        <button id="rewrite" disabled>Rewrite & Download</button>
        <button id="reset" class="btn-secondary" style="display:none">Reset</button>
      </div>

      <div class="section">
        <h3>Summary</h3>
        <div class="stats">
          <div>Files scanned: <span id="filesScanned">0</span></div>
          <div>Links found: <span id="linksFound">0</span></div>
          <div>Links rewritten: <span id="linksRewritten">0</span></div>
        </div>
      </div>

      <div class="section">
        <h3>Sample rewrites (up to 10)</h3>
        <div id="samples"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <div id="loading-overlay" style="display: none;">
      <div class="loading-spinner"></div>
      <p>Loading...</p>
    </div>
  </body>
</html>
